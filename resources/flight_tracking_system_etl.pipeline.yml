# The main pipeline for flight_tracking_system

resources:
  pipelines:
    flight_tracking_system_etl:
      name: flight_tracking_system_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/flight_tracking_system_etl"

      libraries:
        - glob:
            include: ../src/flight_tracking_system_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
