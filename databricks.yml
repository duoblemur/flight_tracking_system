# This is a Databricks asset bundle definition for flight_tracking_system.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: flight_tracking_system
  uuid: 62254ff7-a772-4bfd-a1ed-d773ba781859

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
    variables:
      catalog: flight_tracking_dev
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/valeriialiebiedie179@softserve.academy to make sure we only have a single copy.
      root_path: /Workspace/Users/valeriialiebiedie179@softserve.academy/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: flight_tracking_dev
      schema: prod
    permissions:
      - user_name: valeriialiebiedie179@softserve.academy
        level: CAN_MANAGE
